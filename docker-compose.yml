# Usage: docker compose -p go2serve up -d

services:
  go2serve:
    image: go2serve
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
      # - "443:8443"   # uncomment for HTTPS
    volumes:
      - /path/to/files:/srv:ro
      # - /path/to/certs:/certs:ro   # uncomment for manual HTTPS certs
      # - go2serve-certs:/certs      # uncomment for Let's Encrypt
    command: ["--root", "/srv"]
    # HTTPS with manual certs:
    # command: ["--root", "/srv", "--cert", "/certs/cert.pem", "--key", "/certs/key.pem", "--host", "example.com"]
    # HTTPS with Let's Encrypt:
    # command: ["--root", "/srv", "--domain", "example.com"]

# Uncomment for Let's Encrypt:
# volumes:
#   go2serve-certs:
